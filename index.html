<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyhetsradar</title>

<style>

body{
  margin:0;
  background:#07111f;
  color:white;
  font-family:Arial,sans-serif;
}

.topbar{
  padding:18px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  border-bottom:1px solid #1b3355;
  background:#0b1b33;
}

.market-wrap{
  display:flex;
  gap:10px;
  padding:12px;
}

.market{
  flex:1;
  background:#102544;
  border:1px solid #1d3d66;
  border-radius:14px;
  padding:12px;
  text-align:center;
}

.market-title{
  font-size:18px;
  margin-bottom:8px;
}

.market-time{
  font-size:13px;
  color:#c8d8ef;
}

.dot{
  display:inline-block;
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:6px;
}

.green{background:#00d26a;}
.yellow{background:#ffd54a;}
.red{background:#ff4b4b;}

.add-wrap{
  display:flex;
  gap:8px;
  padding:0 12px 12px 12px;
}

.add-wrap input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#102544;
  color:white;
}

.add-wrap button{
  background:#1c4f88;
  color:white;
  border:none;
  border-radius:12px;
  padding:0 16px;
  font-size:18px;
}

.row{
  display:flex;
  margin:12px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid #1d3d66;
  background:#102544;
}

.left{
  width:35%;
  padding:14px;
  border-right:1px solid #1d3d66;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.stock-name{
  font-size:20px;
  font-weight:bold;
  margin-bottom:14px;
}

.controls{
  display:flex;
  gap:6px;
}

.controls button{
  flex:1;
  background:#1c4f88;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px;
}

.right{
  width:65%;
  max-height:180px;
  overflow-y:auto;
  padding:12px;
  background:#0c1b30;
}

.news-item{
  display:block;
  text-decoration:none;
  color:white;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  background:#132b4b;
  font-size:14px;
}

.news-item:hover{
  background:#1b3a63;
}

.loading{
  color:#b8cbe2;
  font-size:14px;
}

</style>
</head>

<body>

<div class="topbar" id="greeting">🌙 God kväll</div>

<div class="market-wrap">

  <div class="market">
    <div class="market-title">🇸🇪 Sverige</div>
    <div class="market-time" id="seMarket"></div>
  </div>

  <div class="market">
    <div class="market-title">🇺🇸 USA</div>
    <div class="market-time" id="usMarket"></div>
  </div>

  <div class="market">
    <div class="market-title">🇨🇦 Kanada</div>
    <div class="market-time" id="caMarket"></div>
  </div>

</div>

<div class="add-wrap">
  <input id="stockInput" placeholder="Lägg till bolag">
  <button onclick="addStock()">➕</button>
</div>

<div id="stockList"></div>

<script>

const defaultStocks = [
  "NexGen",
  "Denison",
  "Energy Fuels",
  "Paladin",
  "Global Atomic",
  "IsoEnergy",
  "Premier American Uranium",
  "Vizsla Silver",
  "AbraSilver",
  "First Majestic",
  "Endeavour Silver",
  "Petrobras"
];

let stocks = JSON.parse(localStorage.getItem("stocks")) || defaultStocks;

const newsMap = {
  "NexGen":"NexGen Energy uranium",
  "Denison":"Denison Mines uranium",
  "Energy Fuels":"Energy Fuels uranium",
  "Paladin":"Paladin Energy uranium",
  "Global Atomic":"Global Atomic uranium",
  "IsoEnergy":"IsoEnergy uranium",
  "Premier American Uranium":"Premier American Uranium",
  "Vizsla Silver":"Vizsla Silver",
  "AbraSilver":"AbraSilver silver",
  "First Majestic":"First Majestic Silver",
  "Endeavour Silver":"Endeavour Silver",
  "Petrobras":"Petrobras oil"
};

function saveStocks(){
  localStorage.setItem("stocks", JSON.stringify(stocks));
}

function greeting(){

  const h = new Date().getHours();

  let text = "🌙 God kväll";

  if(h < 10){
    text = "☀️ God morgon";
  }
  else if(h < 17){
    text = "🌤️ God middag";
  }

  document.getElementById("greeting").innerText = text;
}

function marketStatus(openHour, closeHour){

  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();

  const current = h * 60 + m;
  const open = openHour * 60;
  const close = closeHour * 60;

  if(current < open){

    const diff = open - current;
    const hh = Math.floor(diff / 60);
    const mm = diff % 60;

    return `<span class="dot yellow"></span>Öppnar om ${hh}h ${mm}m`;
  }

  if(current >= open && current < close){

    const diff = close - current;
    const hh = Math.floor(diff / 60);
    const mm = diff % 60;

    return `<span class="dot green"></span>Stänger om ${hh}h ${mm}m`;
  }

  return `<span class="dot red"></span>Stängd`;
}

function updateMarkets(){

  document.getElementById("seMarket").innerHTML = marketStatus(9,17);
  document.getElementById("usMarket").innerHTML = marketStatus(15,22);
  document.getElementById("caMarket").innerHTML = marketStatus(15,22);
}

function renderStocks(){

  const container = document.getElementById("stockList");
  container.innerHTML = "";

  stocks.forEach((stock,index)=>{

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `

      <div class="left">

        <div class="stock-name">${stock}</div>

        <div class="controls">
          <button onclick="moveUp(${index})">⬆</button>
          <button onclick="moveDown(${index})">⬇</button>
          <button onclick="removeStock(${index})">✕</button>
        </div>

      </div>

      <div class="right" id="news-${index}">
        <div class="loading">Laddar nyheter...</div>
      </div>

    `;

    container.appendChild(row);

    loadNews(stock,index);

  });

}

function loadNews(stock,index){

  const query = encodeURIComponent(newsMap[stock] || stock);

  const newsBox = document.getElementById(`news-${index}`);

  const url = `https://news.google.com/rss/search?q=${query}&hl=sv&gl=SE&ceid=SE:sv`;

  fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url))
    .then(res => res.json())
    .then(data => {

      newsBox.innerHTML = "";

      if(!data.items || data.items.length === 0){

        newsBox.innerHTML = `<div class="loading">Inga nyheter hittades</div>`;
        return;
      }

      data.items.slice(0,6).forEach(item => {

        const a = document.createElement("a");
        a.className = "news-item";
        a.href = item.link;
        a.target = "_blank";
        a.innerText = item.title;

        newsBox.appendChild(a);

      });

    })
    .catch(()=>{

      newsBox.innerHTML = `
        <a class="news-item"
        target="_blank"
        href="https://news.google.com/search?q=${query}">
        Öppna nyheter för ${stock}
        </a>
      `;

    });

}

function addStock(){

  const input = document.getElementById("stockInput");

  const value = input.value.trim();

  if(!value) return;

  stocks.push(value);

  saveStocks();
  renderStocks();

  input.value = "";

}

function removeStock(index){

  stocks.splice(index,1);

  saveStocks();
  renderStocks();

}

function moveUp(index){

  if(index === 0) return;

  [stocks[index], stocks[index-1]] =
  [stocks[index-1], stocks[index]];

  saveStocks();
  renderStocks();

}

function moveDown(index){

  if(index === stocks.length-1) return;

  [stocks[index], stocks[index+1]] =
  [stocks[index+1], stocks[index]];

  saveStocks();
  renderStocks();

}

greeting();
updateMarkets();
renderStocks();

setInterval(updateMarkets,60000);

</script>

</body>
</html>
