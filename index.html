<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nyhetsradar V17</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css"> 
  
</head>

<body>

<header id="greeting">🌙 God kväll</header>

<div id="today"
style="
text-align:center;
margin-top:-10px;
margin-bottom:12px;
font-size:16px;
opacity:.85;
">
</div> 
  
<div class="top">

  <div class="market">
    🇸🇪 Sverige
    <small id="se"></small>
  </div>

  <div class="market">
    🇺🇸 USA
    <small id="us"></small>
  </div>

  <div class="market">
    🇨🇦 Kanada
    <small id="ca"></small>
  </div>

</div>

<div class="toolbox">

  <div class="toolbar">

    <input
    id="newStock"
    placeholder="Lägg till bolag">

    <div class="tool-buttons">

      <button onclick="addStock()">
      +
      </button>

      <button onclick="render()">
      🔄
      </button>

      <button onclick="exportStocks()">
      💾
      </button>

      <button
      onclick="
      document
      .getElementById(
      'importFile'
      )
      .click()
      ">
      📂
      </button>

    </div>

  </div>

</div>

<div id="list"></div>

<input
type="file"
id="importFile"
accept=".json"
style="display:none"
onchange="importStocks(event)"> 
  
<script src="js/storage.js"></script>
  
<script>

const defaultStocks = [

{
name:"Energy Fuels",
search:"Energy Fuels uranium",
type:"uran",
collapsed:false
},

{
name:"Denison",
search:"Denison Mines uranium",
type:"uran",
collapsed:false
},

{
name:"NexGen",
search:"NexGen Energy uranium",
type:"uran",
collapsed:false
},

{
name:"Paladin",
search:"Paladin Energy uranium",
type:"uran",
collapsed:false
},

{
name:"Global Atomic",
search:"Global Atomic Corp uranium",
type:"uran",
collapsed:false
},

{
name:"IsoEnergy",
search:"IsoEnergy uranium",
type:"uran",
collapsed:false
},

{
name:"Premier American Uranium",
search:"Premier American Uranium uranium",
type:"uran",
collapsed:false
},

{
name:"AbraSilver",
search:"AbraSilver silver",
type:"silver",
collapsed:false
},

{
name:"First Majestic",
search:"First Majestic Silver",
type:"silver",
collapsed:false
},

{
name:"Endeavour Silver",
search:"Endeavour Silver silver",
type:"silver",
collapsed:false
},

{
name:"Petrobras",
search:"Petrobras oil",
type:"energy",
collapsed:false
}

];

let stocks =
JSON.parse(localStorage.getItem("stocks"))
|| defaultStocks;

if(typeof stocks[0] === "string"){

  stocks = stocks.map(s=>({

    name:s,
    search:s,
    type:"uran",
    collapsed:false

  }));

}
 
function greet(){

  let h=new Date().getHours();

  if(h<5){
    greeting.innerHTML="🌙 God natt";
  }
  else if(h<10){
    greeting.innerHTML="☀️ God morgon";
  }
  else if(h<18){
    greeting.innerHTML="🌤️ God middag";
  }
  else{
    greeting.innerHTML="🌙 God kväll";
  }
}

function todayDate(){

  let d =
  new Date();

  let text =
  d.toLocaleDateString(
    "sv-SE",
    {
      weekday:"long",
      day:"numeric",
      month:"long"
    }
  );

  text =
  text.charAt(0).toUpperCase()
  + text.slice(1);

  document
  .getElementById("today")
  .innerHTML = text;
}

function market(open,close,timeZone){

  let now =
  new Date();

  let local =
  new Date(

    now.toLocaleString(
      "en-US",
      { timeZone: timeZone }
    )

  );

  let day =
  local.getDay();

  if(day===0 || day===6){

    return "🔴 Stängt (helg)";
  }

  let h =
  local.getHours();

  if(h<open){

    return "🟡 Öppnar senare";
  }

  if(h>=open && h<close){

    return "🟢 Öppet";
  }

  return "🔴 Stängt";
}

function markets(){

  se.innerHTML=
  market(
    9,
    17,
    "Europe/Stockholm"
  );

  us.innerHTML=
  market(
    9,
    16,
    "America/New_York"
  );

  ca.innerHTML=
  market(
    9,
    16,
    "America/Toronto"
  );
 }

function toggleCollapse(i){

  stocks[i].collapsed =
  !stocks[i].collapsed;

  save();

  render();
}

function editStock(i,val){

  stocks[i].name=val;

  stocks[i].search=val;

  save();
}

async function getNews(stock){

  let q =
  encodeURIComponent(stock.search);

  let rss =
  "https://news.google.com/rss/search?q="+q;

  let api =
  "https://api.rss2json.com/v1/api.json?rss_url="
  + encodeURIComponent(rss);

  try{

    let res=await fetch(api);

    let data=await res.json();

    if(!data.items ||
       data.items.length===0){

      return fallback(q);
    }

    let items=data.items;

    items.sort((a,b)=>
      new Date(b.pubDate)
      -
      new Date(a.pubDate)
    );

    let now=new Date();

    items=items.filter(n=>{

      let d=
      new Date(n.pubDate);

      let diff=
      (now-d)/(1000*60*60*24);

      return diff<=21;

    });

    if(items.length===0){

      return fallback(q);
    }

    let html="";

    items.slice(0,10).forEach(n=>{

      let desc=
      n.description
      .replace(/<[^>]*>/g,"")
      .slice(0,140);

      let d=
      new Date(n.pubDate);

      let diff=
      (now-d)/(1000*60*60);

      let fresh=
      diff<24;

      let date=
      d.toLocaleDateString("sv-SE");

      html+=`

      <div class="card
      ${fresh ? "fresh" : ""}">

        <a href="${n.link}"
        target="_blank">

          ${n.title}

        </a>

        <div class="date">

          ${date}

        </div>

        <div class="desc">

          ${desc}...

        </div>

      </div>

      `;
    });

    return html;

  }
  catch(e){

    return fallback(q);
  }
}

function fallback(q){

  return `

  <a class="fallback"
  href="https://news.google.com/search?q=${q}"
  target="_blank">

  🔗 Öppna senaste nyheter

  </a>

  `;
}

async function render(){

  list.innerHTML="";

  let filtered =
  stocks;

  for(let i=0;i<filtered.length;i++){

    let s=filtered[i];

    let realIndex =
    stocks.indexOf(s);

    let row=
    document.createElement("div");

    row.className = "row";
  

    row.innerHTML=`

    <div class="left">

      <input
      class="stock-edit"
      value="${s.name}"
      onchange="editStock(
      ${realIndex},
      this.value
      )">

      <div class="buttons">

        <button
        onclick="up(${realIndex})">
        ↑
        </button>

        <button
        onclick="down(${realIndex})">
        ↓
        </button>

        <button
        onclick="toggleCollapse(
        ${realIndex}
        )">

        ${s.collapsed ? "▸" : "▾"}

        </button>
        
        <button
        onclick="removeStock(
        ${realIndex}
        )">
        ×
        </button>

      </div>

    </div>

    <div class="news
    ${s.collapsed ? "hidden" : ""}"
    id="news${realIndex}">

      <div class="loading">

      Laddar nyheter...

      </div>

    </div>

    `;

    list.appendChild(row);

    if(!s.collapsed){

      getNews(s).then(html=>{

        document
        .getElementById(
        "news"+realIndex
        ).innerHTML=html;

      });

    }
  }

  save();
}

function addStock(){

  let v=
  newStock.value.trim();

  if(!v) return;

  stocks.push({

    name:v,
    search:v,
    type:"uran",
    collapsed:false

  });

  newStock.value="";

  render();
}

function removeStock(i){

  stocks.splice(i,1);

  render();
}

function up(i){

  if(i===0) return;

  [stocks[i],stocks[i-1]]
  =
  [stocks[i-1],stocks[i]];

  render();
}

function down(i){

  if(i===stocks.length-1)
  return;

  [stocks[i],stocks[i+1]]
  =
  [stocks[i+1],stocks[i]];

  render();
}

 const blob =
  new Blob(
    [data],
    {type:"application/json"}
  );

  const a =
  document.createElement("a");

  a.href =
  URL.createObjectURL(blob);

  a.download =
  "nyhetsradar-backup.json";

  a.click();

}  
  
greet();

todayDate();
  
markets();

render();

setInterval(render,900000);

</script>

<script>

if ("serviceWorker" in navigator) {

  navigator.serviceWorker
  .register("./service-worker.js")

  .then(() => {

    console.log("Service Worker registrerad");

  });

}

</script>

</body>
</html>
