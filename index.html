<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nyhetsradar V12</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#102440;
  color:white;
}

header{
  text-align:center;
  padding:18px;
  font-size:28px;
  font-weight:bold;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:12px;
}

.market{
  background:#dce8fa;
  color:#1c2f4f;
  border-radius:18px;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.market small{
  display:block;
  margin-top:8px;
  font-size:15px;
}

.add{
  display:flex;
  gap:10px;
  padding:12px;
}

.add input{
  flex:1;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  background:#dce8fa;
}

.add button{
  width:70px;
  border:none;
  border-radius:18px;
  background:#3c6ec0;
  color:white;
  font-size:28px;
}

.refresh{
  margin:0 12px 12px;
  width:calc(100% - 24px);
  border:none;
  border-radius:16px;
  padding:14px;
  background:#4a7bd1;
  color:white;
  font-size:18px;
  font-weight:bold;
}

.row{
  display:grid;
  grid-template-columns:34% 66%;
  margin:12px;
  border-radius:22px;
  overflow:hidden;
  background:#dce8fa;
  color:#1c2f4f;
}

.left{
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.stock-edit{
  width:100%;
  border:none;
  background:white;
  border-radius:12px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  color:#1c2f4f;
  box-sizing:border-box;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.buttons button{
  flex:1;
  border:none;
  border-radius:12px;
  background:#3c6ec0;
  color:white;
  padding:12px;
  font-size:20px;
}

.news{
  background:#edf4ff;
  padding:10px;
  max-height:360px;
  overflow-y:auto;
}

.card{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.card.fresh{
  border-left:6px solid #4a7bd1;
}

.card a{
  text-decoration:none;
  color:#1c2f4f;
  font-size:17px;
  font-weight:bold;
  display:block;
  margin-bottom:6px;
}

.date{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.desc{
  font-size:15px;
  color:#555;
  line-height:1.35;
}

.loading{
  padding:18px;
  color:#666;
}

.fallback{
  display:block;
  text-decoration:none;
  background:white;
  color:#3c6ec0;
  font-weight:bold;
  padding:16px;
  border-radius:16px;
}

@media (max-width:700px){

  .top{
    grid-template-columns:1fr;
  }

  .row{
    grid-template-columns:1fr;
  }

  .news{
    max-height:420px;
  }

}

</style>
</head>

<body>

<header id="greeting">🌙 God kväll</header>

<div class="top">

  <div class="market">
    🇸🇪 Sverige
    <small id="se"></small>
  </div>

  <div class="market">
    🇺🇸 USA
    <small id="us"></small>
  </div>

  <div class="market">
    🇨🇦 Kanada
    <small id="ca"></small>
  </div>

</div>

<div class="add">

  <input id="newStock"
  placeholder="Lägg till bolag">

  <button onclick="addStock()">+</button>

</div>

<button class="refresh" onclick="render()">
🔄 Uppdatera nyheter
</button>

<div id="list"></div>

<script>

const defaultStocks = [

  "Energy Fuels",
  "Denison",
  "NexGen",
  "Paladin",
  "Global Atomic",
  "IsoEnergy",
  "Premier American Uranium",
  "Vizsla Silver",
  "AbraSilver",
  "First Majestic",
  "Endeavour Silver",
  "Petrobras"

];

let stocks =
JSON.parse(localStorage.getItem("stocks"))
|| defaultStocks;

const searchMap = {

  "Energy Fuels":"Energy Fuels uranium",

  "Denison":"Denison Mines uranium",

  "NexGen":"NexGen Energy uranium",

  "Paladin":"Paladin Energy uranium",

  "Global Atomic":"Global Atomic Corp uranium",

  "IsoEnergy":"IsoEnergy uranium",

  "Premier American Uranium":"Premier American Uranium uranium",

  "Vizsla Silver":"Vizsla Silver silver",

  "AbraSilver":"AbraSilver silver",

  "First Majestic":"First Majestic Silver",

  "Endeavour Silver":"Endeavour Silver",

  "Petrobras":"Petrobras oil"

};

function greet(){

  let h=new Date().getHours();

  if(h<5){
    greeting.innerHTML="🌙 God natt";
  }
  else if(h<10){
    greeting.innerHTML="☀️ God morgon";
  }
  else if(h<18){
    greeting.innerHTML="🌤️ God middag";
  }
  else{
    greeting.innerHTML="🌙 God kväll";
  }
}

function market(open,close){

  let h=new Date().getHours();

  if(h<open){
    return "🟡 Öppnar senare";
  }

  if(h>=open && h<close){
    return "🟢 Öppet";
  }

  return "🔴 Stängt";
}

function markets(){

  se.innerHTML=market(9,17);

  us.innerHTML=market(15,22);

  ca.innerHTML=market(15,22);
}

function saveStocks(){

  localStorage.setItem(
    "stocks",
    JSON.stringify(stocks)
  );
}

function editStock(i,val){

  stocks[i]=val;

  saveStocks();
}

async function getNews(stock){

  let q =
  encodeURIComponent(
    searchMap[stock] || stock
  );

  let rss =
  "https://news.google.com/rss/search?q="+q;

  let api =
  "https://api.rss2json.com/v1/api.json?rss_url="
  + encodeURIComponent(rss);

  try{

    let res=await fetch(api);

    let data=await res.json();

    if(!data.items ||
       data.items.length===0){

      return fallback(q);
    }

    let items = data.items;

    items.sort((a,b)=>
      new Date(b.pubDate)
      -
      new Date(a.pubDate)
    );

    let now = new Date();

    items = items.filter(n=>{

      let d =
      new Date(n.pubDate);

      let diff =
      (now-d)/(1000*60*60*24);

      return diff <= 21;

    });

    if(items.length===0){
      return fallback(q);
    }

    let html="";

    items.slice(0,10).forEach(n=>{

      let desc =
      n.description
      .replace(/<[^>]*>/g,"")
      .slice(0,140);

      let d =
      new Date(n.pubDate);

      let diff =
      (now-d)/(1000*60*60);

      let fresh =
      diff < 24;

      let date =
      d.toLocaleDateString("sv-SE");

      html += `

      <div class="card
      ${fresh ? "fresh" : ""}">

        <a href="${n.link}"
        target="_blank">

          ${n.title}

        </a>

        <div class="date">

          ${date}

        </div>

        <div class="desc">

          ${desc}...

        </div>

      </div>

      `;
    });

    return html;

  }
  catch(e){

    return fallback(q);
  }
}

function fallback(q){

  return `

  <a class="fallback"
  href="https://news.google.com/search?q=${q}"
  target="_blank">

    🔗 Öppna senaste nyheter

  </a>

  `;
}

async function render(){

  list.innerHTML="";

  for(let i=0;i<stocks.length;i++){

    let s=stocks[i];

    let row =
    document.createElement("div");

    row.className="row";

    row.innerHTML=`

    <div class="left">

      <input
      class="stock-edit"
      value="${s}"
      onchange="editStock(${i},this.value)">

      <div class="buttons">

        <button onclick="up(${i})">
        ↑
        </button>

        <button onclick="down(${i})">
        ↓
        </button>

        <button onclick="removeStock(${i})">
        ×
        </button>

      </div>

    </div>

    <div class="news"
    id="news${i}">

      <div class="loading">

        Laddar nyheter...

      </div>

    </div>

    `;

    list.appendChild(row);

    getNews(s).then(html=>{

      document
      .getElementById("news"+i)
      .innerHTML=html;

    });
  }

  saveStocks();
}

function addStock(){

  let v =
  newStock.value.trim();

  if(!v) return;

  stocks.push(v);

  newStock.value="";

  render();
}

function removeStock(i){

  stocks.splice(i,1);

  render();
}

function up(i){

  if(i===0) return;

  [stocks[i],stocks[i-1]]
  =
  [stocks[i-1],stocks[i]];

  render();
}

function down(i){

  if(i===stocks.length-1)
  return;

  [stocks[i],stocks[i+1]]
  =
  [stocks[i+1],stocks[i]];

  render();
}

greet();

markets();

render();

setInterval(render,900000);

</script>

</body>
</html>
