<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nyhetsradar V11</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f2342;
  color:white;
}

header{
  text-align:center;
  padding:18px;
  font-size:28px;
  font-weight:bold;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:12px;
}

.market{
  background:#d7e4f7;
  color:#1b2e4b;
  border-radius:20px;
  padding:16px;
  text-align:center;
  font-weight:bold;
}

.market small{
  display:block;
  margin-top:8px;
  font-size:15px;
}

.add{
  display:flex;
  gap:10px;
  padding:12px;
}

.add input{
  flex:1;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  background:#dce8fa;
}

.add button{
  width:70px;
  border:none;
  border-radius:18px;
  background:#2f63ad;
  color:white;
  font-size:28px;
}

.refresh{
  margin:0 12px 12px;
  width:calc(100% - 24px);
  border:none;
  border-radius:16px;
  padding:14px;
  background:#4478c9;
  color:white;
  font-size:18px;
  font-weight:bold;
}

.row{
  display:grid;
  grid-template-columns:34% 66%;
  margin:12px;
  border-radius:22px;
  overflow:hidden;
  background:#dce8fa;
  color:#1b2e4b;
}

.left{
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.left h2{
  margin:0;
  font-size:22px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.buttons button{
  flex:1;
  border:none;
  border-radius:12px;
  background:#2f63ad;
  color:white;
  padding:12px;
  font-size:20px;
}

.news{
  background:#eef5ff;
  padding:10px;
  max-height:300px;
  overflow-y:auto;
}

.card{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.card a{
  text-decoration:none;
  color:#1b2e4b;
  font-size:17px;
  font-weight:bold;
  display:block;
  margin-bottom:6px;
}

.date{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.desc{
  font-size:15px;
  color:#555;
  line-height:1.35;
}

.fallback{
  display:block;
  text-decoration:none;
  background:white;
  color:#2f63ad;
  font-weight:bold;
  padding:16px;
  border-radius:16px;
}

.loading{
  padding:18px;
  color:#666;
}

</style>
</head>

<body>

<header id="greeting">🌙 God kväll</header>

<div class="top">

  <div class="market">
    🇸🇪 Sverige
    <small id="se"></small>
  </div>

  <div class="market">
    🇺🇸 USA
    <small id="us"></small>
  </div>

  <div class="market">
    🇨🇦 Kanada
    <small id="ca"></small>
  </div>

</div>

<div class="add">
  <input id="newStock" placeholder="Lägg till bolag">
  <button onclick="addStock()">+</button>
</div>

<button class="refresh" onclick="render()">
🔄 Uppdatera nyheter
</button>

<div id="list"></div>

<script>

const defaultStocks = [

  "Energy Fuels",
  "Denison",
  "NexGen",
  "Paladin",
  "Global Atomic",
  "IsoEnergy",
  "Premier American Uranium",
  "Vizsla Silver",
  "AbraSilver",
  "First Majestic",
  "Endeavour Silver",
  "Petrobras"

];

let stocks =
JSON.parse(localStorage.getItem("stocks"))
|| defaultStocks;

const searchMap = {

  "Energy Fuels":"EFR uranium",

  "Denison":"DML uranium",

  "NexGen":"NXE uranium",

  "Paladin":"PDN uranium",

  "Global Atomic":"GLO uranium",

  "IsoEnergy":"ISO uranium",

  "Premier American Uranium":"PUR uranium",

  "Vizsla Silver":"VZLA silver",

  "AbraSilver":"ABRA silver",

  "First Majestic":"AG silver",

  "Endeavour Silver":"EXK silver",

  "Petrobras":"PBR oil"

};

function greet(){

  let h=new Date().getHours();

  if(h<5){
    greeting.innerHTML="🌙 God natt";
  }
  else if(h<10){
    greeting.innerHTML="☀️ God morgon";
  }
  else if(h<18){
    greeting.innerHTML="🌤️ God middag";
  }
  else{
    greeting.innerHTML="🌙 God kväll";
  }
}

function market(open,close){

  let d=new Date();

  let h=d.getHours();

  if(h<open){
    return "🟡 Öppnar senare";
  }

  if(h>=open && h<close){
    return "🟢 Öppet";
  }

  return "🔴 Stängt";
}

function markets(){

  se.innerHTML=market(9,17);

  us.innerHTML=market(15,22);

  ca.innerHTML=market(15,22);
}

async function getNews(stock){

  let q =
  encodeURIComponent(searchMap[stock] || stock);

  let rss =
  "https://news.google.com/rss/search?q="+q;

  let api =
  "https://api.rss2json.com/v1/api.json?rss_url="
  + encodeURIComponent(rss);

  try{

    let res=await fetch(api);

    let data=await res.json();

    if(!data.items || data.items.length===0){

      return `
      <a class="fallback"
      href="https://news.google.com/search?q=${q}"
      target="_blank">
      🔗 Öppna senaste nyheter
      </a>
      `;
    }

    let html="";

    data.items.slice(0,5).forEach(n=>{

      let desc =
      n.description
      .replace(/<[^>]*>/g,"")
      .slice(0,120);

      let date =
      new Date(n.pubDate)
      .toLocaleDateString("sv-SE");

      html += `

      <div class="card">

        <a href="${n.link}" target="_blank">
          ${n.title}
        </a>

        <div class="date">
          ${date}
        </div>

        <div class="desc">
          ${desc}...
        </div>

      </div>
      `;
    });

    return html;

  }
  catch(e){

    return `
    <a class="fallback"
    href="https://news.google.com/search?q=${q}"
    target="_blank">
    🔗 Öppna Google News
    </a>
    `;
  }
}

async function render(){

  list.innerHTML="";

  for(let i=0;i<stocks.length;i++){

    let s=stocks[i];

    let row=document.createElement("div");

    row.className="row";

    row.innerHTML=`

    <div class="left">

      <h2>${s}</h2>

      <div class="buttons">

        <button onclick="up(${i})">↑</button>

        <button onclick="down(${i})">↓</button>

        <button onclick="removeStock(${i})">×</button>

      </div>

    </div>

    <div class="news" id="news${i}">
      <div class="loading">
      Laddar nyheter...
      </div>
    </div>

    `;

    list.appendChild(row);

    getNews(s).then(html=>{

      document
      .getElementById("news"+i)
      .innerHTML=html;

    });
  }

  localStorage.setItem(
    "stocks",
    JSON.stringify(stocks)
  );
}

function addStock(){

  let v=
  newStock.value.trim();

  if(!v) return;

  stocks.push(v);

  newStock.value="";

  render();
}

function removeStock(i){

  stocks.splice(i,1);

  render();
}

function up(i){

  if(i===0) return;

  [stocks[i],stocks[i-1]]
  =
  [stocks[i-1],stocks[i]];

  render();
}

function down(i){

  if(i===stocks.length-1)
  return;

  [stocks[i],stocks[i+1]]
  =
  [stocks[i+1],stocks[i]];

  render();
}

greet();

markets();

render();

</script>

</body>
</html>
