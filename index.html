<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nyhetsradar V17</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css"> 
  <style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#102440;
  color:white;
}

header{
  text-align:center;
  padding:18px;
  font-size:28px;
  font-weight:bold;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:12px;
}

.market{
  background:#dce8fa;
  color:#1d2f4d;
  border-radius:18px;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.market small{
  display:block;
  margin-top:8px;
  font-size:15px;
}

.toolbox{
  margin:12px;
  border-radius:22px;
  background:#dce8fa;
  padding:18px;
}

.toolbar{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.toolbar input{
  width:100%;
  box-sizing:border-box;
  border:none;
  background:white;
  border-radius:12px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  color:#1d2f4d;
}

.tool-buttons{
  display:flex;
  gap:10px;
}

.tool-buttons button{
  flex:1;
  border:none;
  border-radius:12px;
  background:#4679cb;
  color:white;
  font-size:22px;
  padding:12px;
}

.row{
  display:grid;
  grid-template-columns:34% 66%;
  margin:12px;
  border-radius:22px;
  overflow:hidden;
  background:#dce8fa;
  color:#1d2f4d;
}

.left{
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.stock-edit{
  width:100%;
  border:none;
  background:white;
  border-radius:12px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  color:#1d2f4d;
  box-sizing:border-box;
}

.buttons{
  display:flex;
  gap:8px;
  margin-top:18px;
}

.buttons button{
  flex:1;
  border:none;
  border-radius:12px;
  background:#4679cb;
  color:white;
  padding:12px;
  font-size:18px;
}

.news{
  background:#edf4ff;
  padding:10px;
  max-height:380px;
  overflow-y:auto;
}

.news.hidden{
  display:none;
}

.card{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.card.fresh{
  border-left:6px solid #4679cb;
}

.card a{
  text-decoration:none;
  color:#1d2f4d;
  font-size:17px;
  font-weight:bold;
  display:block;
  margin-bottom:6px;
}

.date{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.desc{
  font-size:15px;
  color:#555;
  line-height:1.35;
}

.fallback{
  display:block;
  background:white;
  text-decoration:none;
  color:#4679cb;
  font-weight:bold;
  padding:16px;
  border-radius:16px;
}

.loading{
  padding:18px;
  color:#666;
}

@media (max-width:700px){

 .top{
    grid-template-columns:1fr;
  }
 .toolbar{
    flex-wrap:wrap;
  } 
 .toolbar input{
    flex:1 1 100%;
  }
  .row{
    grid-template-columns:1fr;
  }
  .news{
    max-height:460px;
  }

}

</style>
</head>

<body>

<header id="greeting">🌙 God kväll</header>

<div id="today"
style="
text-align:center;
margin-top:-10px;
margin-bottom:12px;
font-size:16px;
opacity:.85;
">
</div> 
  
<div class="top">

  <div class="market">
    🇸🇪 Sverige
    <small id="se"></small>
  </div>

  <div class="market">
    🇺🇸 USA
    <small id="us"></small>
  </div>

  <div class="market">
    🇨🇦 Kanada
    <small id="ca"></small>
  </div>

</div>

<div class="toolbox">

  <div class="toolbar">

    <input
    id="newStock"
    placeholder="Lägg till bolag">

    <div class="tool-buttons">

      <button onclick="addStock()">
      +
      </button>

      <button onclick="render()">
      🔄
      </button>

      <button onclick="exportStocks()">
      💾
      </button>

      <button
      onclick="
      document
      .getElementById(
      'importFile'
      )
      .click()
      ">
      📂
      </button>

    </div>

  </div>

</div>

<div id="list"></div>

<input
type="file"
id="importFile"
accept=".json"
style="display:none"
onchange="importStocks(event)"> 
  
<script>

const defaultStocks = [

{
name:"Energy Fuels",
search:"Energy Fuels uranium",
type:"uran",
collapsed:false
},

{
name:"Denison",
search:"Denison Mines uranium",
type:"uran",
collapsed:false
},

{
name:"NexGen",
search:"NexGen Energy uranium",
type:"uran",
collapsed:false
},

{
name:"Paladin",
search:"Paladin Energy uranium",
type:"uran",
collapsed:false
},

{
name:"Global Atomic",
search:"Global Atomic Corp uranium",
type:"uran",
collapsed:false
},

{
name:"IsoEnergy",
search:"IsoEnergy uranium",
type:"uran",
collapsed:false
},

{
name:"Premier American Uranium",
search:"Premier American Uranium uranium",
type:"uran",
collapsed:false
},

{
name:"AbraSilver",
search:"AbraSilver silver",
type:"silver",
collapsed:false
},

{
name:"First Majestic",
search:"First Majestic Silver",
type:"silver",
collapsed:false
},

{
name:"Endeavour Silver",
search:"Endeavour Silver silver",
type:"silver",
collapsed:false
},

{
name:"Petrobras",
search:"Petrobras oil",
type:"energy",
collapsed:false
}

];

let stocks =
JSON.parse(localStorage.getItem("stocks"))
|| defaultStocks;

if(typeof stocks[0] === "string"){

  stocks = stocks.map(s=>({

    name:s,
    search:s,
    type:"uran",
    collapsed:false

  }));

}

function save(){

  localStorage.setItem(
    "stocks",
    JSON.stringify(stocks)
  );
}
  
function greet(){

  let h=new Date().getHours();

  if(h<5){
    greeting.innerHTML="🌙 God natt";
  }
  else if(h<10){
    greeting.innerHTML="☀️ God morgon";
  }
  else if(h<18){
    greeting.innerHTML="🌤️ God middag";
  }
  else{
    greeting.innerHTML="🌙 God kväll";
  }
}

function todayDate(){

  let d =
  new Date();

  let text =
  d.toLocaleDateString(
    "sv-SE",
    {
      weekday:"long",
      day:"numeric",
      month:"long"
    }
  );

  text =
  text.charAt(0).toUpperCase()
  + text.slice(1);

  document
  .getElementById("today")
  .innerHTML = text;
}

function market(open,close,timeZone){

  let now =
  new Date();

  let local =
  new Date(

    now.toLocaleString(
      "en-US",
      { timeZone: timeZone }
    )

  );

  let day =
  local.getDay();

  if(day===0 || day===6){

    return "🔴 Stängt (helg)";
  }

  let h =
  local.getHours();

  if(h<open){

    return "🟡 Öppnar senare";
  }

  if(h>=open && h<close){

    return "🟢 Öppet";
  }

  return "🔴 Stängt";
}

function markets(){

  se.innerHTML=
  market(
    9,
    17,
    "Europe/Stockholm"
  );

  us.innerHTML=
  market(
    9,
    16,
    "America/New_York"
  );

  ca.innerHTML=
  market(
    9,
    16,
    "America/Toronto"
  );
 }

function toggleCollapse(i){

  stocks[i].collapsed =
  !stocks[i].collapsed;

  save();

  render();
}

function editStock(i,val){

  stocks[i].name=val;

  stocks[i].search=val;

  save();
}

async function getNews(stock){

  let q =
  encodeURIComponent(stock.search);

  let rss =
  "https://news.google.com/rss/search?q="+q;

  let api =
  "https://api.rss2json.com/v1/api.json?rss_url="
  + encodeURIComponent(rss);

  try{

    let res=await fetch(api);

    let data=await res.json();

    if(!data.items ||
       data.items.length===0){

      return fallback(q);
    }

    let items=data.items;

    items.sort((a,b)=>
      new Date(b.pubDate)
      -
      new Date(a.pubDate)
    );

    let now=new Date();

    items=items.filter(n=>{

      let d=
      new Date(n.pubDate);

      let diff=
      (now-d)/(1000*60*60*24);

      return diff<=21;

    });

    if(items.length===0){

      return fallback(q);
    }

    let html="";

    items.slice(0,10).forEach(n=>{

      let desc=
      n.description
      .replace(/<[^>]*>/g,"")
      .slice(0,140);

      let d=
      new Date(n.pubDate);

      let diff=
      (now-d)/(1000*60*60);

      let fresh=
      diff<24;

      let date=
      d.toLocaleDateString("sv-SE");

      html+=`

      <div class="card
      ${fresh ? "fresh" : ""}">

        <a href="${n.link}"
        target="_blank">

          ${n.title}

        </a>

        <div class="date">

          ${date}

        </div>

        <div class="desc">

          ${desc}...

        </div>

      </div>

      `;
    });

    return html;

  }
  catch(e){

    return fallback(q);
  }
}

function fallback(q){

  return `

  <a class="fallback"
  href="https://news.google.com/search?q=${q}"
  target="_blank">

  🔗 Öppna senaste nyheter

  </a>

  `;
}

async function render(){

  list.innerHTML="";

  let filtered =
  stocks;

  for(let i=0;i<filtered.length;i++){

    let s=filtered[i];

    let realIndex =
    stocks.indexOf(s);

    let row=
    document.createElement("div");

    row.className = "row";
  

    row.innerHTML=`

    <div class="left">

      <input
      class="stock-edit"
      value="${s.name}"
      onchange="editStock(
      ${realIndex},
      this.value
      )">

      <div class="buttons">

        <button
        onclick="up(${realIndex})">
        ↑
        </button>

        <button
        onclick="down(${realIndex})">
        ↓
        </button>

        <button
        onclick="toggleCollapse(
        ${realIndex}
        )">

        ${s.collapsed ? "▸" : "▾"}

        </button>
        
        <button
        onclick="removeStock(
        ${realIndex}
        )">
        ×
        </button>

      </div>

    </div>

    <div class="news
    ${s.collapsed ? "hidden" : ""}"
    id="news${realIndex}">

      <div class="loading">

      Laddar nyheter...

      </div>

    </div>

    `;

    list.appendChild(row);

    if(!s.collapsed){

      getNews(s).then(html=>{

        document
        .getElementById(
        "news"+realIndex
        ).innerHTML=html;

      });

    }
  }

  save();
}

function addStock(){

  let v=
  newStock.value.trim();

  if(!v) return;

  stocks.push({

    name:v,
    search:v,
    type:"uran",
    collapsed:false

  });

  newStock.value="";

  render();
}

function removeStock(i){

  stocks.splice(i,1);

  render();
}

function up(i){

  if(i===0) return;

  [stocks[i],stocks[i-1]]
  =
  [stocks[i-1],stocks[i]];

  render();
}

function down(i){

  if(i===stocks.length-1)
  return;

  [stocks[i],stocks[i+1]]
  =
  [stocks[i+1],stocks[i]];

  render();
}

function exportStocks(){

  const data =
  JSON.stringify(
    stocks,
    null,
    2
  );

  const blob =
  new Blob(
    [data],
    {type:"application/json"}
  );

  const a =
  document.createElement("a");

  a.href =
  URL.createObjectURL(blob);

  a.download =
  "nyhetsradar-backup.json";

  a.click();

}  
  
function importStocks(event){

  const file =
  event.target.files[0];

  if(!file) return;

  const reader =
  new FileReader();

  reader.onload = function(e){

    try{

      const imported =
      JSON.parse(
        e.target.result
      );

      if(!Array.isArray(imported)){

        alert("Ogiltig backupfil");

        return;
      }

      if(
        !confirm(
          "Importera lista?\nNuvarande lista ersätts."
        )
      ){
        return;
      }

      stocks = imported;

      save();

      render();

      event.target.value = "";
      
      alert("Import klar");

    }
    catch{

      alert(
        "Kunde inte läsa filen"
      );

    }

  };

  reader.readAsText(file);

}
  
greet();

todayDate();
  
markets();

render();

setInterval(render,900000);

</script>

<script>

if ("serviceWorker" in navigator) {

  navigator.serviceWorker
  .register("./service-worker.js")

  .then(() => {

    console.log("Service Worker registrerad");

  });

}

</script>

</body>
</html>
