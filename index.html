<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nyhetsradar</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0d2340;
  color:white;
}

header{
  text-align:center;
  padding:18px;
  font-size:26px;
  font-weight:bold;
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:12px;
}

.market{
  background:#cfdcf0;
  color:#1a2a44;
  border-radius:20px;
  padding:16px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.market small{
  display:block;
  margin-top:8px;
  font-size:16px;
}

.addbox{
  display:flex;
  gap:10px;
  padding:12px;
}

.addbox input{
  flex:1;
  border:none;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  background:#dbe6f7;
}

.addbox button{
  width:70px;
  border:none;
  border-radius:18px;
  background:#2c5aa0;
  color:white;
  font-size:30px;
}

.refresh{
  margin:0 12px 12px;
  width:calc(100% - 24px);
  border:none;
  border-radius:16px;
  padding:14px;
  background:#3d6ec1;
  color:white;
  font-size:18px;
  font-weight:bold;
}

.row{
  display:grid;
  grid-template-columns:34% 66%;
  margin:12px;
  border-radius:22px;
  overflow:hidden;
  background:#dbe6f7;
  color:#1a2a44;
}

.left{
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.left h2{
  margin:0;
  font-size:22px;
}

.controls{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.controls button{
  flex:1;
  border:none;
  border-radius:12px;
  background:#2f63ad;
  color:white;
  font-size:22px;
  padding:12px;
}

.news{
  background:#edf3fc;
  padding:10px;
  max-height:290px;
  overflow-y:auto;
}

.item{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.item a{
  text-decoration:none;
  color:#1a2a44;
  font-weight:bold;
  font-size:17px;
  display:block;
  margin-bottom:8px;
}

.date{
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.desc{
  font-size:15px;
  color:#555;
}

.loading{
  padding:20px;
  color:#555;
}

</style>
</head>

<body>

<header id="greet">🌙 God kväll</header>

<div class="top">
  <div class="market">
    🇸🇪 Sverige
    <small id="se"></small>
  </div>

  <div class="market">
    🇺🇸 USA
    <small id="us"></small>
  </div>

  <div class="market">
    🇨🇦 Kanada
    <small id="ca"></small>
  </div>
</div>

<div class="addbox">
  <input id="newStock" placeholder="Lägg till bolag">
  <button onclick="add()">+</button>
</div>

<button class="refresh" onclick="render()">
🔄 Uppdatera nyheter
</button>

<div id="list"></div>

<script>

let stocks = JSON.parse(localStorage.getItem("stocks")) || [
  "Energy Fuels",
  "Denison",
  "NexGen",
  "Paladin",
  "Global Atomic",
  "IsoEnergy",
  "Premier American Uranium",
  "Vizsla Silver",
  "AbraSilver",
  "First Majestic",
  "Endeavour Silver",
  "Petrobras"
];

function greet(){
  let h=new Date().getHours();

  if(h<5){
    document.getElementById("greet").innerHTML="🌙 God natt";
  }
  else if(h<10){
    document.getElementById("greet").innerHTML="☀️ God morgon";
  }
  else if(h<18){
    document.getElementById("greet").innerHTML="🌤️ God middag";
  }
  else{
    document.getElementById("greet").innerHTML="🌙 God kväll";
  }
}

function market(open,close){
  let d=new Date();
  let h=d.getHours();
  let m=d.getMinutes();

  if(h<open){
    return "🟡 Öppnar om "+(open-h)+"h";
  }

  if(h>=open && h<close){
    return "🟢 Öppet";
  }

  return "🔴 Stängd";
}

function markets(){
  document.getElementById("se").innerHTML=market(9,17);
  document.getElementById("us").innerHTML=market(15,22);
  document.getElementById("ca").innerHTML=market(15,22);
}

const feeds = {
  "Energy Fuels":"https://news.google.com/rss/search?q=Energy+Fuels",
  "Denison":"https://news.google.com/rss/search?q=Denison+Mines",
  "NexGen":"https://news.google.com/rss/search?q=NXE+uranium",
  "Paladin":"https://news.google.com/rss/search?q=Paladin+Energy",
  "Global Atomic":"https://news.google.com/rss/search?q=Global+Atomic",
  "IsoEnergy":"https://news.google.com/rss/search?q=IsoEnergy",
  "Premier American Uranium":"https://news.google.com/rss/search?q=Premier+American+Uranium",
  "Vizsla Silver":"https://news.google.com/rss/search?q=Vizsla+Silver",
  "AbraSilver":"https://news.google.com/rss/search?q=AbraSilver",
  "First Majestic":"https://news.google.com/rss/search?q=First+Majestic",
  "Endeavour Silver":"https://news.google.com/rss/search?q=Endeavour+Silver",
  "Petrobras":"https://news.google.com/rss/search?q=Petrobras"
};

async function loadNews(stock){

  let feed=feeds[stock];

  if(!feed){
    return `<div class="loading">Ingen feed hittades</div>`;
  }

  try{

    let url="https://api.rss2json.com/v1/api.json?rss_url="+encodeURIComponent(feed);

    let res=await fetch(url);
    let data=await res.json();

    if(!data.items || data.items.length===0){
      return `<div class="loading">Inga nyheter hittades</div>`;
    }

    let html="";

    data.items.slice(0,5).forEach(n=>{

      let date=new Date(n.pubDate);

      html+=`
      <div class="item">

        <a href="${n.link}" target="_blank">
          ${n.title}
        </a>

        <div class="date">
          ${date.toLocaleDateString("sv-SE")}
        </div>

        <div class="desc">
          ${n.description.replace(/<[^>]*>/g,"").slice(0,120)}...
        </div>

      </div>
      `;
    });

    return html;

  }catch(e){

    return `<div class="loading">Feed kunde inte laddas</div>`;
  }
}

async function render(){

  let box=document.getElementById("list");
  box.innerHTML="";

  for(let i=0;i<stocks.length;i++){

    let s=stocks[i];

    let row=document.createElement("div");
    row.className="row";

    row.innerHTML=`

      <div class="left">

        <h2>${s}</h2>

        <div class="controls">
          <button onclick="up(${i})">↑</button>
          <button onclick="down(${i})">↓</button>
          <button onclick="del(${i})">×</button>
        </div>

      </div>

      <div class="news" id="news${i}">
        <div class="loading">Laddar nyheter...</div>
      </div>
    `;

    box.appendChild(row);

    loadNews(s).then(html=>{
      document.getElementById("news"+i).innerHTML=html;
    });
  }

  localStorage.setItem("stocks",JSON.stringify(stocks));
}

function add(){

  let v=document.getElementById("newStock").value.trim();

  if(!v) return;

  stocks.push(v);

  document.getElementById("newStock").value="";

  render();
}

function del(i){
  stocks.splice(i,1);
  render();
}

function up(i){

  if(i===0) return;

  [stocks[i],stocks[i-1]]=[stocks[i-1],stocks[i]];

  render();
}

function down(i){

  if(i===stocks.length-1) return;

  [stocks[i],stocks[i+1]]=[stocks[i+1],stocks[i]];

  render();
}

greet();
markets();
render();

</script>

</body>
</html>
